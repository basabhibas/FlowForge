{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block page_title %}Sign in{% endblock %}

{% block content %}
<div style="max-width:420px; margin:40px auto;">
    <div class="card">
        <h2 class="section-title">Sign in to FlowForge</h2>
        <p class="text-muted">Use the default admin account (username: <strong>admin</strong>, password: <strong>admin</strong>)</p>
        <form method="post" style="margin-top:16px;">
            <div class="form-group">
                <label class="form-label">Username</label>
                <input name="username" class="form-control" placeholder="admin">
            </div>
            <div class="form-group mt-8">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" placeholder="password">
            </div>
            <div style="margin-top:18px; display:flex; gap:8px; justify-content:flex-end;">
                <a href="/" class="btn btn-outline">Cancel</a>
                <button class="btn btn-primary" type="submit">Sign In</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
