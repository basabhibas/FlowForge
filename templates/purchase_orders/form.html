{% extends "base.html" %}
{% block title %}New Purchase Order{% endblock %}
{% block page_title %}Create Purchase Order{% endblock %}
{% block topbar_actions %}
<a href="/purchase-orders" class="btn btn-outline btn-sm">← Back to POs</a>
{% endblock %}

{% block content %}
<div class="card" style="max-width: 900px;">
    <form method="POST" action="/purchase-orders/add">

        <div class="form-group mb-24">
            <label class="form-label">Vendor *</label>
            <select class="form-control" name="vendor_id">
                <option value="">-- Vendor Chuno --</option>
                {% for vendor in vendors %}
                <option value="{{ vendor['id'] }}">{{ vendor['name'] }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="card-title mb-16">Items</div>

        <div id="items-container">
            <div class="po-item" style="display:grid; grid-template-columns:2fr 1fr 1fr 1fr; gap:12px; margin-bottom:12px; align-items:end;">
                <div class="form-group" style="margin-bottom:0;">
                    <label class="form-label">Product</label>
                    <select class="form-control" name="product_id[]">
                        <option value="">-- Product Chuno --</option>
                        {% for product in products %}
                        <option value="{{ product['id'] }}">{{ product['name'] }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group" style="margin-bottom:0;">
                    <label class="form-label">Quantity</label>
                    <input class="form-control" type="number" name="quantity[]" min="1" value="1">
                </div>
                <div class="form-group" style="margin-bottom:0;">
                    <label class="form-label">Purchase Price (₹)</label>
                    <input class="form-control" type="number" name="purchase_price[]" step="0.01" min="0" placeholder="0.00">
                </div>
                <div class="form-group" style="margin-bottom:0;">
                    <label class="form-label">GST (%)</label>
                    <select class="form-control" name="gst_percent[]">
                        <option value="0">0%</option>
                        <option value="5">5%</option>
                        <option value="12">12%</option>
                        <option value="18">18%</option>
                        <option value="28">28%</option>
                    </select>
                </div>
            </div>
        </div>

        <button type="button" onclick="addItem()" class="btn btn-outline btn-sm" style="margin-bottom:24px;">
            + Add Another Item
        </button>

        <hr class="divider">

        <div class="actions-row">
            <button type="submit" class="btn btn-primary">Create Purchase Order</button>
            <a href="/purchase-orders" class="btn btn-outline">Cancel</a>
        </div>
    </form>
</div>

{% block scripts %}
<script>
function addItem() {
    const container = document.getElementById('items-container');
    const firstItem = container.querySelector('.po-item');
    const newItem = firstItem.cloneNode(true);
    newItem.querySelectorAll('select').forEach(s => s.selectedIndex = 0);
    newItem.querySelectorAll('input').forEach(i => i.value = '');

    const removeBtn = document.createElement('button');
    removeBtn.type = 'button';
    removeBtn.textContent = '✕ Remove';
    removeBtn.className = 'btn btn-danger btn-sm';
    removeBtn.style.marginTop = '4px';
    removeBtn.onclick = () => newItem.remove();
    newItem.appendChild(removeBtn);

    container.appendChild(newItem);
}
</script>
{% endblock %}
{% endblock %}
