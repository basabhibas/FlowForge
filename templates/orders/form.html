{% extends "base.html" %}
{% block title %}New Order{% endblock %}
{% block page_title %}Create Order{% endblock %}
{% block topbar_actions %}
<a href="/orders" class="btn btn-outline btn-sm">← Back to Orders</a>
{% endblock %}

{% block content %}
<div class="card" style="max-width: 760px;">
    <form method="POST" action="/orders/add">

        <div class="form-group mb-24">
            <label class="form-label">Customer *</label>
            <select class="form-control" name="customer_id">
                <option value="">-- Customer Chuno --</option>
                {% for customer in customers %}
                <option value="{{ customer['id'] }}">{{ customer['name'] }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="card-title mb-16">Order Items</div>

        <div id="items-container">
            <div class="order-item" style="display:grid; grid-template-columns:2fr 1fr; gap:12px; margin-bottom:12px;">
                <div class="form-group" style="margin-bottom:0;">
                    <label class="form-label">Product</label>
                    <select class="form-control" name="product_id[]">
                        <option value="">-- Product Chuno --</option>
                        {% for product in products %}
                        <option value="{{ product['id'] }}">
                            {{ product['name'] }} (Stock: {{ product['stock_qty'] }})
                        </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group" style="margin-bottom:0;">
                    <label class="form-label">Quantity</label>
                    <input class="form-control" type="number" name="quantity[]" min="1" value="1">
                </div>
            </div>
        </div>

        <button type="button" onclick="addItem()" class="btn btn-outline btn-sm" style="margin-bottom:24px;">
            + Add Another Item
        </button>

        <hr class="divider">

        <div class="actions-row">
            <button type="submit" class="btn btn-primary">Create Order</button>
            <a href="/orders" class="btn btn-outline">Cancel</a>
        </div>
    </form>
</div>

{% block scripts %}
<script>
function addItem() {
    const container = document.getElementById('items-container');
    const firstItem = container.querySelector('.order-item');
    const newItem = firstItem.cloneNode(true);
    newItem.querySelectorAll('select').forEach(s => s.selectedIndex = 0);
    newItem.querySelectorAll('input').forEach(i => i.value = 1);

    // Add a remove button
    const removeBtn = document.createElement('button');
    removeBtn.type = 'button';
    removeBtn.textContent = '✕ Remove';
    removeBtn.className = 'btn btn-danger btn-sm';
    removeBtn.style.marginTop = '4px';
    removeBtn.onclick = () => newItem.remove();
    newItem.appendChild(removeBtn);

    container.appendChild(newItem);
}
</script>
{% endblock %}
{% endblock %}
