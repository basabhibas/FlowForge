{% extends "base.html" %}

{% block title %}{{ 'Edit' if product else 'Add' }} Product{% endblock %}

{% block content %}
<div class="card">
    <h2>{{ 'Edit' if product else 'Naya' }} Product</h2>

    <form method="POST" style="margin-top: 20px;">

        <div class="form-group">
            <label>Product Name</label>
            <input type="text" name="name" 
                   value="{{ product['name'] if product else '' }}"
                   placeholder="Jaise: Laptop, Mouse, T-Shirt...">
        </div>

        <div class="form-group">
            <label>SKU (Unique Code)</label>
            <input type="text" name="sku" 
                   value="{{ product['sku'] if product else '' }}"
                   placeholder="Jaise: LAP-001, MOU-001...">
        </div>

        <div class="form-group">
            <label>Purchase Price (₹)</label>
            <input type="number" name="purchase_price" step="0.01"
                   value="{{ product['purchase_price'] if product else '' }}"
                   placeholder="Vendor se kharida price">
        </div>

        <div class="form-group">
            <label>Selling Price (₹)</label>
            <input type="number" name="unit_price" step="0.01"
                   value="{{ product['unit_price'] if product else '' }}"
                   placeholder="Customer ko becha price">
        </div>

        <div class="form-group">
            <label>GST (%)</label>
            <select name="gst_percent" style="width: 100%; padding: 10px 12px;
                border: 1px solid #ddd; border-radius: 6px; font-size: 14px;">
                <option value="0" {% if product and product['gst_percent'] == 0 %}selected{% endif %}>0%</option>
                <option value="5" {% if product and product['gst_percent'] == 5 %}selected{% endif %}>5%</option>
                <option value="12" {% if product and product['gst_percent'] == 12 %}selected{% endif %}>12%</option>
                <option value="18" {% if product and product['gst_percent'] == 18 %}selected{% endif %}>18%</option>
                <option value="28" {% if product and product['gst_percent'] == 28 %}selected{% endif %}>28%</option>
            </select>
        </div>

        <div class="form-group">
            <label>Stock Quantity</label>
            <input type="number" name="stock_qty"
                   value="{{ product['stock_qty'] if product else '0' }}"
                   placeholder="0">
        </div>

        <div class="form-group">
            <label>Description (Optional)</label>
            <textarea name="description" rows="3" 
                      placeholder="Product ke baare mein kuch likho...">{{ product['description'] if product else '' }}</textarea>
        </div>

        <button type="submit">
            {{ 'Update' if product else 'Save' }} Product
        </button>
        <a href="/products" class="btn-cancel">Cancel</a>

    </form>
</div>
{% endblock %}
