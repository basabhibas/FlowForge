{% extends 'base.html' %}

{% block title %}Forgot Password{% endblock %}

{% block page_title %}Forgot Password{% endblock %}

{% block content %}
<div style="max-width:520px; margin:40px auto;">
    <div class="card">
        <h2 class="section-title">Reset your password</h2>
        <p class="text-muted">Enter your username and we'll send a password reset link (simulated).</p>
        <form method="post" style="margin-top:16px;">
            <div class="form-group">
                <label class="form-label">Username</label>
                <input name="username" class="form-control" placeholder="your username">
            </div>
            <div style="margin-top:18px; display:flex; gap:8px; justify-content:flex-end;">
                <a href="/" class="btn btn-outline">Cancel</a>
                <button class="btn btn-primary" type="submit">Send reset link</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
