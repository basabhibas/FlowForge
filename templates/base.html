<!-- templates/base.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title><link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
<title>FlowForge – {% block title %}Home{% endblock %}</title></title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: #f5f5f5; color: #333; }

        nav {
            background: #1a1a2e;
            padding: 14px 24px;
            display: flex;
            align-items: center;
            gap: 24px;
        }
        nav .brand { color: #e2b96f; font-weight: bold; font-size: 18px; }
        nav a { color: #ccc; text-decoration: none; font-size: 14px; }
        nav a:hover { color: white; }

        .container { max-width: 1100px; margin: 32px auto; padding: 0 24px; }

        .card {
            background: white;
            border-radius: 8px;
            padding: 24px;
            border: 1px solid #e0e0e0;
        }

        .alert {
        padding: 12px 16px;
        border-radius: 6px;
        margin-bottom: 16px;
        font-size: 14px;
        }
        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .alert-danger {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #555;
            margin-bottom: 6px;
        }
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            font-family: sans-serif;
        }
        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #e2b96f;
        }
        button[type="submit"] {
            background: #1a1a2e;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
        }
        button[type="submit"]:hover {
            background: #2d2d4e;
        }
        .btn-cancel {
            margin-left: 12px;
            font-size: 14px;
            color: #888;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <nav>
        <img src="{{ url_for('static', filename='logo.png') }}" height="45" style="border-radius: 20px;">
        <a href="/">Home</a>
        <a href="/products">Products</a>
        <a href="/vendors">Vendors</a>
        <a href="/customers">Customers</a>
        <a href="/orders">Orders</a>
        <a href="/purchase-orders">Purchase Orders</a>
        <a href="/invoices">Invoices</a>
        <a href="/settings">Settings</a>
        <a href="/about">About</a>
    </nav>

    <div class="container">
            <!-- Flash Messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

    
        {% block content %}
        {% endblock %}
    </div>

</body>
</html>
