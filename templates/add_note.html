<!-- templates/add_note.html -->
{% extends "base.html" %}

{% block title %}Add Note{% endblock %}

{% block content %}
<div class="card">
    <h2>Add New Note</h2>
    <p style="color: #666; margin-top: 4px; font-size: 14px;">
        Yeh same form pattern har jagah use hoga — products, orders, customers.
    </p>

    <form method="POST" action="/notes/add" style="margin-top: 20px;">

        <div class="form-group">
            <label>Title</label>
            <input type="text" name="title" placeholder="Title of the Note...">
        </div>

        <div class="form-group">
            <label>Content</label>
            <textarea name="content" rows="4" placeholder="Write content here..."></textarea>
        </div>

        <button type="submit">Save Note</button>
        <a href="/" class="btn-cancel">Cancel</a>

    </form>
</div>
{% endblock %}
