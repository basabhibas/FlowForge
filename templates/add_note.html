{% extends "base.html" %}
{% block title %}Add Note{% endblock %}
{% block page_title %}Add Note{% endblock %}
{% block topbar_actions %}
<a href="/" class="btn btn-outline btn-sm">← Back to Dashboard</a>
{% endblock %}

{% block content %}
<div class="card" style="max-width: 560px;">
    <form method="POST" action="/notes/add">
        <div class="form-group mb-16">
            <label class="form-label">Title *</label>
            <input class="form-control" type="text" name="title" placeholder="Note ka title...">
        </div>
        <div class="form-group mb-24">
            <label class="form-label">Content *</label>
            <textarea class="form-control" name="content" rows="5"
                      placeholder="Note content yahan likho..."></textarea>
        </div>
        <div class="actions-row">
            <button type="submit" class="btn btn-primary">Save Note</button>
            <a href="/" class="btn btn-outline">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
