{% extends "base.html" %}
{% block title %}{{ 'Edit' if customer else 'Add' }} Customer{% endblock %}
{% block page_title %}{{ 'Edit' if customer else 'New' }} Customer{% endblock %}
{% block topbar_actions %}
<a href="/customers" class="btn btn-outline btn-sm">← Back to Customers</a>
{% endblock %}

{% block content %}
<div class="card" style="max-width: 600px;">
    <form method="POST">
        <div class="form-grid">
            <div class="form-group form-full">
                <label class="form-label">Customer Name *</label>
                <input class="form-control" type="text" name="name"
                       value="{{ customer['name'] if customer else '' }}"
                       placeholder="e.g. Rahul Sharma, ABC Company...">
            </div>
            <div class="form-group">
                <label class="form-label">Email</label>
                <input class="form-control" type="email" name="email"
                       value="{{ customer['email'] if customer else '' }}"
                       placeholder="customer@example.com">
            </div>
            <div class="form-group">
                <label class="form-label">Phone</label>
                <input class="form-control" type="text" name="phone"
                       value="{{ customer['phone'] if customer else '' }}"
                       placeholder="9876543210">
            </div>
            <div class="form-group form-full">
                <label class="form-label">Address</label>
                <textarea class="form-control" name="address"
                          placeholder="Customer ka address...">{{ customer['address'] if customer else '' }}</textarea>
            </div>
        </div>
        <div class="actions-row">
            <button type="submit" class="btn btn-primary">{{ 'Update' if customer else 'Save' }} Customer</button>
            <a href="/customers" class="btn btn-outline">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
